apiVersion: apps/v1
kind: Deployment
metadata: 
  name: nginx-dep
  labels:
    apps: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: my-app
  template:
    metadata:
      labels:
        apps: my-app
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-con 
              mountPath: "/etc/nginx/conf.d" 
              readOnly: true
      volumes:
        - name: nginx-con
          configMap:
            name: nginx-config 

