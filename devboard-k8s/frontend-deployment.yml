apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    apps: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: frontend
  template:
    metadata:
      labels:
        apps: frontend
    spec:
      containers:
        - name: frontend-devboard
          image: rohit5126/devboard-frontend:latest
          ports:
            - containerPort: 4173
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi