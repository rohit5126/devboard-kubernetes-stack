apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    apps: postgres
  ports:
    - port: 5432
      targetPort: 5432

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    apps: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: postgres
  serviceName: "postgres"
  template:
    metadata:
      labels:
        apps: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: pg

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_DB
          volumeMounts:
            - name: init 
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true  
            - name: my-pvc
              mountPath: /var/lib/postgresql/data
              subPath: postgres-data
      volumes:
        - name: init
          configMap:
            name: pg-config

  volumeClaimTemplates:
    - metadata:
        name: my-pvc 
      spec:
        storageClassName: "standard"
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "1Gi"
