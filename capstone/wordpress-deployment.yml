apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-deployment
  labels:
    apps: wordpress
  namespace: capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: wordpress
  template:
    metadata:
      labels:
        apps: wordpress
    spec:
      enableServiceLinks: false 
      containers:
        - name: wordpress
          image: wordpress:latest
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mys-config
                  key: WORDPRESS_DB_HOST
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mys-config
                  key: WORDPRESS_DB_NAME
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: cap-sec
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cap-sec
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
            initialDelaySeconds: 60  
            periodSeconds: 10    
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
            initialDelaySeconds: 60   # Wait 10s before checking (gives WP time to start)
            periodSeconds: 10          # Check every 10s      
              