apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    apps: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      apps: backend
  template:
    metadata:
      labels:
        apps: backend
    spec:
      containers:
        - name: backend
          image: rohit5126/devboard-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_DB
            - name: PORT
              value: '8080'
            - name: POSTGRES_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)?sslmode=disable"